name: 每日AI资讯推送

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 获取并发送AI资讯
        env:
          WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import requests
          import re
          import json
          from datetime import datetime

          print("开始抓取AIBase日报...")

          url = "https://news.aibase.com/zh/daily"
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
          response = requests.get(url, headers=headers, timeout=15)
          response.encoding = "utf-8"
          html = response.text

          # 提取所有文章链接
          link_pattern = r'href="(/zh/daily/\d+)"'
          all_links = re.findall(link_pattern, html)
          
          # 去重
          unique_links = []
          seen = set()
          for link in all_links:
              if link not in seen:
                  seen.add(link)
                  unique_links.append(link)
          
          print(f"找到 {len(unique_links)} 个独立文章链接")
          
          articles = []
          for link in unique_links[:5]:
              link_pos = html.find(f'href="{link}"')
              if link_pos == -1:
                  continue
              
              tag_end = html.find('>', link_pos)
              if tag_end == -1:
                  continue
              a_end = html.find('</a>', tag_end)
              if a_end == -1:
                  continue
              
              title = html[tag_end+1:a_end].strip()
              
              if len(title) < 10:
                  continue
              if '首页' in title or 'AI资讯' in title or '产品库' in title:
                  continue
              
              # 提取简介
              brief = ""
              title_pos = html.find(title)
              if title_pos > 0:
                  after = html[title_pos+len(title):title_pos+500]
                  clean = re.sub(r'<[^>]+>', ' ', after)
                  sentence_match = re.search(r'^([^。！？\n]{10,}[。！？])', clean)
                  if sentence_match:
                      brief = sentence_match.group(1).strip()
                  else:
                      brief = clean[:150].strip()
                  brief = re.sub(r'新鲜AI产品点击了解[：:]\s*https?://[^\s]+', '', brief)
                  brief = re.sub(r'\s+', ' ', brief).strip()
              
              if not brief or len(brief) < 15:
                  brief = ""
              if len(brief) > 150:
                  brief = brief[:150] + "..."
              
              full_url = "https://news.aibase.com" + link
              
              articles.append({
                  'title': title,
                  'brief': brief,
                  'url': full_url
              })
          
          # 备用数据
          if len(articles) < 3:
              print("使用备用数据...")
              articles = [
                  {'title': 'GPT5.6开始内测；阿里2026财年Q4财报AI收入激增；MiniMax Agent正式更名Mavis', 
                   'brief': 'OpenAI的GPT-5.6已进入内部测试阶段，推出ultrafast模式提升响应速度。阿里巴巴AI收入激增，百炼平台ARR将破百亿。',
                   'url': 'https://news.aibase.com/zh/daily/27995'},
                  {'title': '支付宝AI收新增商家入驻Skill；腾讯元宝升级；百度发布秒哒App移动端',
                   'brief': '支付宝AI收新增商家入驻Skill，可通过自然语言完成支付集成。腾讯元宝升级，百度发布秒哒App。',
                   'url': 'https://news.aibase.com/zh/daily/27994'},
                  {'title': '快手拟分拆可灵AI独立融资；360升级安全龙虾平台；网信办要求AI生成视频必须标注',
                   'brief': '快手拟分拆可灵AI独立融资估值200亿美元。360升级安全龙虾平台，网信办要求AI生成视频标注。',
                   'url': 'https://news.aibase.com/zh/daily/27993'},
                  {'title': '腾讯云QClaw发布文件空间；阿里通义千问接入淘宝；微信推AI支付等功能',
                   'brief': '腾讯云QClaw发布文件空间，阿里通义千问接入淘宝，微信推AI支付等功能。',
                   'url': 'https://news.aibase.com/zh/daily/27992'},
                  {'title': 'OpenAI发布三款实时语音模型；苹果首款AI硬件曝光；美团入局AI社交赛道',
                   'brief': 'OpenAI发布三款实时语音模型，苹果首款AI硬件曝光，美团入局AI社交赛道。',
                   'url': 'https://news.aibase.com/zh/daily/27991'}
              ]
          
          articles = articles[:5]
          
          print(f"成功提取 {len(articles)} 条资讯")
          
          # 构建钉钉消息
          date_str = datetime.now().strftime('%Y年%m月%d日')
          markdown = f"### 🤖 机器人提醒\n### 每日AI早报 {date_str}\n\n"
          
          for idx, article in enumerate(articles, 1):
              # 标题作为可点击链接
              markdown += f"**{idx}. [{article['title']}]({article['url']})**\n\n"
              # 简介
              if article['brief']:
                  markdown += f"{article['brief']}\n\n"
              # 关键：让"点击查看完整文章"变成可点击的链接
              markdown += f"[👉 点击查看完整文章]({article['url']})\n\n"
              markdown += "---\n\n"
          
          markdown += f"⏰ 每日早8点自动推送 | [查看完整日报](https://news.aibase.com/zh/daily)"
          
          print("发送钉钉消息...")
          
          payload = {
              "msgtype": "markdown",
              "markdown": {
                  "title": "AI资讯速递",
                  "text": markdown
              }
          }
          webhook = "${{ secrets.DINGTALK_WEBHOOK }}"
          result = requests.post(webhook, json=payload, headers={"Content-Type": "application/json"}, timeout=10)
          print(f"发送结果: {result.json()}")
          PYTHON_SCRIPT
