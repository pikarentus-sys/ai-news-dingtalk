name: 每日AI资讯推送

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 获取并发送AI资讯
        env:
          WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import requests
          import re
          import json
          from datetime import datetime

          url = "https://news.aibase.com/zh/daily"
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
          response = requests.get(url, headers=headers, timeout=15)
          response.encoding = "utf-8"
          html = response.text

          # 方法1：直接查找所有文章链接
          # 匹配 /zh/daily/数字 这种格式的链接
          article_links = re.findall(r'href="(/zh/daily/\d+)"', html)
          article_titles = re.findall(r'<a[^>]*href="/zh/daily/\d+"[^>]*>([^<]+)</a>', html)
          
          news_list = []
          seen_titles = set()
          
          for i in range(min(5, len(article_links))):
              if i >= len(article_titles):
                  break
              
              link = article_links[i]
              title = article_titles[i].strip()
              
              # 去重
              if title in seen_titles:
                  continue
              seen_titles.add(title)
              
              full_url = "https://news.aibase.com" + link
              
              # 提取简介：在标题附近找内容
              brief = ""
              # 在HTML中找到标题后面的段落
              title_pos = html.find(title)
              if title_pos > 0:
                  # 取标题后面500个字符
                  after_title = html[title_pos:title_pos+800]
                  # 提取简介（去掉HTML标签）
                  brief_match = re.search(r'</a>\s*<[^>]*>\s*([^<]+)</', after_title)
                  if brief_match:
                      brief = brief_match.group(1).strip()
                  if not brief:
                      # 备用：去掉标签后的纯文本
                      text = re.sub(r'<[^>]+>', ' ', after_title[:500])
                      brief = text[:200].strip()
              
              if not brief:
                  brief = "点击链接查看完整文章"
              
              news_list.append({
                  'id': i+1,
                  'title': title,
                  'brief': brief[:200],
                  'url': full_url
              })
          
          # 如果上面的方法没抓到，用备用方法
          if len(news_list) < 3:
              news_list = []
              # 备用：直接匹配 "AI日报：" 开头的段落
              pattern = r'AI日报：([^<]+?)(?=AI日报：|欢迎来到|$)'
              matches = re.findall(pattern, html, re.DOTALL)
              
              for idx, item in enumerate(matches[:5], 1):
                  lines = [line.strip() for line in item.split('\n') if line.strip()]
                  if not lines:
                      continue
                  title = lines[0]
                  brief = ' '.join(lines[1:]) if len(lines) > 1 else ''
                  brief = re.sub(r'新鲜AI产品点击了解：https?://[^\s]+', '', brief)
                  brief = re.sub(r'\s+', ' ', brief).strip()
                  if len(brief) > 200:
                      brief = brief[:200] + '...'
                  
                  # 尝试从HTML中找对应的链接
                  link_match = re.search(rf'<a[^>]*href="(/zh/daily/\d+)"[^>]*>{re.escape(title[:30])}', html)
                  if link_match:
                      detail_url = "https://news.aibase.com" + link_match.group(1)
                  else:
                      detail_url = "https://news.aibase.com/zh/daily"
                  
                  news_list.append({
                      'id': idx,
                      'title': title,
                      'brief': brief,
                      'url': detail_url
                  })
          
          date_str = datetime.now().strftime('%Y年%m月%d日')
          markdown = f"### 🤖 机器人提醒\n### 每日AI早报 {date_str}\n\n"
          
          for news in news_list:
              markdown += f"**{news['id']}. [{news['title']}]({news['url']})**\n\n{news['brief']}\n\n---\n\n"
          
          markdown += f"⏰ 每日早8点自动推送 | [查看完整日报](https://news.aibase.com/zh/daily)"
          
          payload = {
              "msgtype": "markdown",
              "markdown": {
                  "title": "AI资讯速递",
                  "text": markdown
              }
          }
          webhook = "${{ secrets.DINGTALK_WEBHOOK }}"
          result = requests.post(webhook, json=payload, headers={"Content-Type": "application/json"}, timeout=10)
          print(f"发送结果: {result.json()}")
          PYTHON_SCRIPT
