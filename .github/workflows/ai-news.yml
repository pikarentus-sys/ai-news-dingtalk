name: 每日AI资讯推送

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 获取并发送AI资讯
        env:
          WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import requests
          import re
          import json
          from datetime import datetime
          import html as html_lib

          # 获取页面
          url = "https://news.aibase.com/zh/daily"
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
          response = requests.get(url, headers=headers, timeout=15)
          response.encoding = "utf-8"
          html_content = response.text

          # 提取所有文章链接和标题
          # 匹配格式: <a href="/zh/daily/数字">标题</a>
          pattern = r'<a href="(/zh/daily/\d+)"[^>]*>([^<]+)</a>'
          matches = re.findall(pattern, html_content)

          # 去重，保留顺序
          seen = set()
          unique_matches = []
          for link, title in matches:
              if title not in seen:
                  seen.add(title)
                  unique_matches.append((link, title))

          # 取前5条
          news_list = []
          for idx, (link, title) in enumerate(unique_matches[:5], 1):
              full_url = "https://news.aibase.com" + link
              
              # 提取该文章的简介
              brief = ""
              # 在HTML中找到标题附近的内容
              title_pos = html_content.find(title)
              if title_pos > 0:
                  # 取标题后面600个字符
                  snippet = html_content[title_pos:title_pos+600]
                  # 找段落内容
                  para_match = re.search(r'</a>\s*<[^>]*>\s*([^<]+(?:[\u4e00-\u9fa5]+[^<]*)?)', snippet)
                  if para_match:
                      brief = para_match.group(1).strip()
                  # 清理多余字符
                  brief = re.sub(r'新鲜AI产品点击了解.*$', '', brief)
                  brief = re.sub(r'\s+', ' ', brief).strip()
              
              if not brief or len(brief) < 10:
                  brief = "点击链接查看完整文章"
              if len(brief) > 180:
                  brief = brief[:180] + "..."
              
              news_list.append({
                  'id': idx,
                  'title': title,
                  'brief': brief,
                  'url': full_url
              })

          # 构建消息
          date_str = datetime.now().strftime('%Y年%m月%d日')
          markdown = f"### 🤖 机器人提醒\n### 每日AI早报 {date_str}\n\n"

          for news in news_list:
              markdown += f"**{news['id']}. [{news['title']}]({news['url']})**\n\n{news['brief']}\n\n---\n\n"

          markdown += f"⏰ 每日早8点自动推送 | [查看完整日报](https://news.aibase.com/zh/daily)"

          # 发送
          payload = {
              "msgtype": "markdown",
              "markdown": {
                  "title": "AI资讯速递",
                  "text": markdown
              }
          }
          webhook = "${{ secrets.DINGTALK_WEBHOOK }}"
          result = requests.post(webhook, json=payload, headers={"Content-Type": "application/json"}, timeout=10)
          print(f"发送结果: {result.json()}")
          PYTHON_SCRIPT
